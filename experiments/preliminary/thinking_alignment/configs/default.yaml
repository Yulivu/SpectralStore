output_dir: experiments/preliminary/thinking_alignment/results
random_seed: 701
data:
  n: 80
  T: 8
  n_list: [200, 500, 1000, 2000]
  T_list: [5, 10, 20, 50]
  regime_list: [medium_snr]
  noise_type: iid
  alpha_list: [0.0, 0.3, 0.6, 0.9]
  base_noise_std: 0.05
experiment:
  repeats: 10
query:
  bound_C: 3.0
  loose_tolerance: 100.0
  tight_tolerance: 0.0
robust:
  threshold_scale: 3.0
checks:
  - split_asym_sanity
  - entrywise_bound_coverage
  - robust_sparse_corruption
calibration:
  bound_C_list: [0.5, 1, 1.5, 2, 3, 5, 10]
  threshold_scale_list: [0.5, 1, 2, 3, 5]
  coverage_targets: [0.99, 0.995]

split_asym:
  num_nodes: 80
  num_steps: 8
  num_communities: 4
  p_in: 0.30
  p_out: 0.05
  temporal_jitter: 0.08
  directed: true
  rank: 4
  num_splits: 1
  num_repeats: 2
  construction_tolerance: 1.0e-12
  noise_correlation_abs_limit: 0.10

entrywise_bound:
  dataset: synthetic_sbm
  num_nodes: 80
  num_steps: 8
  num_communities: 4
  p_in: 0.30
  p_out: 0.05
  temporal_jitter: 0.08
  directed: true
  true_rank: 4
  snr: 2.0
  rank: 4
  num_splits: 1
  num_repeats: 2
  bound_constant: 1.0
  include_residual: false
  methods:
    - spectralstore_asym
    - spectralstore_split_asym_unfolding
    - sym_svd
    - direct_svd

asym_temporal_dependence:
  output_dir: experiments/results/exp_asym_temporal_dependence
  dataset: sbm
  num_repeats: 10
  n_list: [200, 500, 1000]
  T_list: [10, 20]
  alpha_list: [0.0, 0.3, 0.6, 0.9]
  regime_list: [medium_snr]
  regimes:
    medium_snr:
      sbm_p: 0.12
      sbm_q: 0.08
    low_snr:
      sbm_p: 0.10
      sbm_q: 0.07
  num_communities: 4
  directed: true
  rank: 4
  num_splits: 1
  base_noise_std: 0.05
  methods:
    - spectralstore_asym
    - spectralstore_split_asym_unfolding
    - sym_svd
    - direct_svd
  precompute_bound_methods:
    - spectralstore_asym
    - spectralstore_split_asym_unfolding
    - sym_svd
    - direct_svd

asym_mechanism_audit:
  output_dir: experiments/results/asym_mechanism_audit
  dataset: temporal_correlated
  num_repeats: 10
  n_list: [200, 500]
  T_list: [10, 20]
  alpha_list: [0.0, 0.9]
  regime_list: [medium_snr]
  noise_type: temporal_correlated
  regimes:
    medium_snr:
      sbm_p: 0.12
      sbm_q: 0.08
    low_snr:
      sbm_p: 0.10
      sbm_q: 0.07
  num_communities: 4
  directed: true
  rank: 4
  num_splits: 1
  temporal_jitter: 0.0
  base_noise_std: 0.05
  methods:
    - spectralstore_asym
    - spectralstore_split_asym_unfolding
    - sym_svd
    - direct_svd

robust_sparse_corruption:
  num_nodes: 70
  num_steps: 6
  num_communities: 4
  p_in: 0.30
  p_out: 0.05
  temporal_jitter: 0.08
  directed: true
  rank: 4
  num_splits: 1
  num_repeats: 1
  corruption_modes:
    - sparse_spike
    - signed_spike
    - block_sparse_spike
  corruption_rates: [0.0, 0.02]
  corruption_magnitude: 4.0
  robust_iterations: 2
  residual_threshold_mode: quantile
  residual_quantile: 0.98
  residual_mad_multiplier: 8.0
  rpca_iterations: 20
  methods:
    - spectralstore_robust
    - spectralstore_asym
    - sym_svd
    - direct_svd
    - rpca_svd

exp1_v2:
  output_dir: experiments/results/exp1_v2/theory_regime
  dataset: sbm
  num_repeats: 10
  n_list: [200, 500, 1000, 2000]
  T_list: [5, 10, 20, 50]
  fixed_n: 500
  fixed_T: 20
  regime_list: [medium_snr]
  noise_type: iid
  include_regime_sweep: false
  regimes:
    medium_snr:
      sbm_p: 0.12
      sbm_q: 0.08
    low_snr:
      sbm_p: 0.10
      sbm_q: 0.07
    very_low_snr:
      sbm_p: 0.08
      sbm_q: 0.06
  num_communities: 4
  temporal_jitter: 0.0
  directed: true
  rank: 4
  num_splits: 1
  base_noise_std: 0.0
  high_variance_fraction: 0.05
  high_variance_multiplier: 5.0
  signal_strength: 1.0
  noise_std: 1.0
  bound_constant: 1.0
  precompute_bounds: true
  methods:
    - spectralstore_asym
    - spectralstore_split_asym_unfolding
    - sym_svd
    - direct_svd
