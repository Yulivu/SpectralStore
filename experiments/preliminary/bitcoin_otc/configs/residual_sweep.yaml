dataset: bitcoin_otc
raw_path: data/raw/soc-sign-bitcoinotc.csv.gz
max_nodes: 300
rank: 8
test_fraction: 0.2
random_seed: 7
num_splits: 1
robust_iterations: 1
entrywise_bound_coverage: 1.0
acceptance:
  max_sparse_ratio: 1.0
  max_heldout_rmse_regression: 0.05
  max_heldout_mae_regression: 0.05
candidates:
  - name: quantile_0_999
    residual_threshold_mode: quantile
    residual_quantile: 0.999
    residual_mad_multiplier: 45.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
  - name: quantile_0_9995
    residual_threshold_mode: quantile
    residual_quantile: 0.9995
    residual_mad_multiplier: 45.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
  - name: quantile_0_9998
    residual_threshold_mode: quantile
    residual_quantile: 0.9998
    residual_mad_multiplier: 45.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
  - name: quantile_0_9999
    residual_threshold_mode: quantile
    residual_quantile: 0.9999
    residual_mad_multiplier: 45.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
  - name: mad_45
    residual_threshold_mode: mad
    residual_quantile: 0.999
    residual_mad_multiplier: 45.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
  - name: mad_80
    residual_threshold_mode: mad
    residual_quantile: 0.999
    residual_mad_multiplier: 80.0
    residual_hybrid_tail_quantile: 0.95
    residual_hybrid_tail_ratio: 2.0
