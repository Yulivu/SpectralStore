dataset: bitcoin_otc
raw_path: data/raw/soc-sign-bitcoinotc.csv.gz
max_nodes: 300
rank: 8
test_fraction: 0.2
random_seed: 7
methods:
  - spectralstore_asym
  - spectralstore_robust
  - sym_svd
  - direct_svd
  - cp_als
  - tucker_als
residual_threshold: null
residual_threshold_mode: quantile
residual_quantile: 0.9999
residual_mad_multiplier: 45.0
residual_hybrid_tail_quantile: 0.95
residual_hybrid_tail_ratio: 2.0
entrywise_bound_coverage: 1.0
robust_iterations: 1
q4_num_queries: 25
q4_window_size: 4
q4_summary_examples: 2
residual_top_k: 10
