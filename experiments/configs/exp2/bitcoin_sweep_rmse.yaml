output_dir: experiments/results/exp2/mainline
raw_path: data/raw/soc-sign-bitcoinotc.csv.gz
max_nodes: 300
test_fraction: 0.10
random_seed: 2026
methods:
  - spectralstore_thinking
  - sym_svd
  - direct_svd
  - tensor_unfolding_svd
  - nmf
rank_selection_mode: fixed
num_splits: 1
residual_threshold_mode: quantile
residual_percentile: 0.9998
storage_gate_action: drop_residual
max_sparse_ratio: 1.0
