output_dir: experiments/results/exp5/ard_diagnostic
random_seed: 2026
num_repeats: 3

datasets:
  - exact_low_rank
  - sbm_observed

true_rank_values:
  - 3
  - 5

num_nodes_values:
  - 120

num_steps_values:
  - 8

noise_scale_values:
  - 0.0
  - 0.02

ard_max_rank: 12
robust_iterations: 1
residual_threshold_mode: quantile
residual_quantile: 0.999
residual_threshold_scale: 1.0

ard:
  prior_alpha: 1e-2
  prior_beta: 1.0
  max_iterations: 100
  tolerance: 1e-6
  min_effective_ratio: 0.05
  min_rank: 1

sbm:
  num_communities: 5
  p_in: 0.25
  p_out: 0.04
  temporal_jitter: 0.08
  directed: true
