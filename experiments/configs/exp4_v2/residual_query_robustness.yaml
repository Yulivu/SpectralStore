output_dir: experiments/results/exp4_v2/residual_query_robustness
random_seed: 2026
num_repeats: 5

dataset:
  num_nodes: 800
  num_steps: 20
  num_communities: 5
  p_in: 0.25
  p_out: 0.04
  temporal_jitter: 0.08
  directed: true
  corruption_magnitude: 4.0
  outlier_weight: 4.0

attack_kinds:
  - sparse_spike
  - signed_spike
  - block_sparse_spike
  - targeted_cross_community

attack_fractions:
  - 0.001
  - 0.002
  - 0.005
  - 0.01

methods:
  - spectralstore_thinking
  - sym_svd
  - direct_svd

compressor:
  rank: 8
  random_seed: 2026
  robust_iterations: 2
  residual_threshold_mode: quantile
  residual_quantile: 0.997
  residual_threshold_scale: 1.0
  residual_storage_format: temporal_coo
  storage_gate_action: diagnostic
  max_sparse_ratio: 1.0
  factor_storage_dtype_bytes: 4
  rank_selection_mode: fixed

q5_threshold: 0.0
q4_window: 5
