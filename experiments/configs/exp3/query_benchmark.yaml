output_dir: experiments/results/exp3/query_benchmark
random_seed: 2026

dataset:
  kind: synthetic_attack
  num_nodes: 500
  num_steps: 20
  num_communities: 5
  p_in: 0.25
  p_out: 0.04
  temporal_jitter: 0.08
  directed: true
  attack_kind: sparse_spike
  attack_fraction: 0.002
  corruption_magnitude: 4.0
  outlier_weight: 4.0

methods:
  - spectralstore_thinking
  - sym_svd
  - direct_svd

compressor:
  rank: 8
  random_seed: 2026
  robust_iterations: 2
  residual_threshold_mode: quantile
  residual_quantile: 0.997
  residual_threshold_scale: 1.0
  residual_storage_format: temporal_coo
  storage_gate_action: diagnostic
  max_sparse_ratio: 1.0
  factor_storage_dtype_bytes: 4
  rank_selection_mode: fixed

workload:
  num_q1: 5000
  num_q2: 1000
  num_q3: 20
  num_q4: 1000
  q2_k: 10
  q4_window: 6
  q5_threshold: 0.0

query_paths:
  q1:
    - factor_only
    - factor_residual
  q2:
    - scan_factor_only
    - scan_residual
    - exact_index
    - exact_index_residual
    - ann_index
    - ann_index_residual
  q4:
    - factor_only
    - factor_residual

ann_index:
  projection_dim: 4
  candidate_multiplier: 6
